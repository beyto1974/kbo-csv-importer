name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ""
          - os: windows-latest
            goos: windows
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build importer
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          BIN="kbo-csv-importer-${VERSION}-${GOOS}-amd64${{ matrix.ext }}"
          go build -o "dist/$BIN" ./private/importer/

      - name: Build explorer
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: |
          BIN="kbo-explorer-${VERSION}-${GOOS}-amd64${{ matrix.ext }}"
          go build -o "dist/$BIN" ./private/explorer_cli/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ github.ref_name }}-${{ matrix.goos }}-amd64
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release-assets/*
